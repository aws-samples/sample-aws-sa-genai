AWSTemplateFormatVersion: '2010-09-09'
Description: 'Complete CloudWatch Vended Logs Pipeline for QuickSight with S3, IAM, and Glue Database'

Resources:
  # S3 Bucket
  AdminSuiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub admin-suite-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # S3 Bucket Policy for CloudWatch Logs
  AdminSuiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminSuiteBucket
      PolicyDocument:
        Statement:
          - Sid: AWSLogDeliveryWrite
            Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub ${AdminSuiteBucket.Arn}/monitoring/quicksight/cw-vended-log/*
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: AWSLogDeliveryAclCheck
            Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt AdminSuiteBucket.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # Glue Database
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: admin-console-2025
        Description: Database for QuickSight vended logs

  # Glue Tables
  ChatLogTable:
    Type: AWS::Glue::Table
    DependsOn: GlueDatabase
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: qs_chat_log
        TableType: EXTERNAL_TABLE
        StorageDescriptor:
          Columns:
            - Name: user_arn
              Type: string
            - Name: user_type
              Type: string
            - Name: status_code
              Type: string
            - Name: conversation_id
              Type: string
            - Name: system_message_id
              Type: string
            - Name: message_scope
              Type: string
            - Name: user_message_id
              Type: string
            - Name: user_message
              Type: string
            - Name: agent_id
              Type: string
            - Name: flow_id
              Type: string
            - Name: system_text_message
              Type: string
            - Name: user_selected_resources
              Type: array<struct<resourceid:string,resourcetype:string>>
            - Name: action_connectors
              Type: array<struct<actionconnectorid:string>>
            - Name: cited_resource
              Type: array<struct<citedresourcetype:string,citedresourceid:string,citedresourcename:string>>
            - Name: file_attachment
              Type: array<string>
            - Name: resource_arn
              Type: string
            - Name: event_timestamp
              Type: bigint
            - Name: logtype
              Type: string
            - Name: accountid
              Type: string
          Location: !Sub s3://${AdminSuiteBucket}/monitoring/quicksight/cw-vended-log/chat-log/AWSLogs/${AWS::AccountId}/quicksuitelogs/
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
            Parameters:
              paths: accountId,action_connectors,agent_id,cited_resource,conversation_id,event_timestamp,file_attachment,flow_id,logType,message_scope,resource_arn,status_code,system_message_id,system_text_message,user_arn,user_message,user_message_id,user_selected_resources,user_type
        PartitionKeys:
          - Name: region
            Type: string
          - Name: account_id
            Type: string
          - Name: year
            Type: string
          - Name: month
            Type: string
          - Name: day
            Type: string
          - Name: hour
            Type: string
        Parameters:
          projection.enabled: 'true'
          projection.region.type: enum
          projection.region.values: us-east-1,us-east-2,us-west-2
          projection.account_id.type: enum
          projection.account_id.values: !Ref AWS::AccountId
          projection.year.type: integer
          projection.year.range: '2024,2030'
          projection.month.type: integer
          projection.month.range: '01,12'
          projection.month.digits: '2'
          projection.day.type: integer
          projection.day.range: '01,31'
          projection.day.digits: '2'
          projection.hour.type: integer
          projection.hour.range: '00,23'
          projection.hour.digits: '2'
          storage.location.template: !Sub s3://${AdminSuiteBucket}/monitoring/quicksight/cw-vended-log/chat-log/AWSLogs/${AWS::AccountId}/quicksuitelogs/$${region}/$${account_id}/$${year}/$${month}/$${day}/$${hour}/
          classification: json
          compressionType: gzip
          partition_filtering.enabled: 'true'
          typeOfData: file

  FeedbackLogTable:
    Type: AWS::Glue::Table
    DependsOn: GlueDatabase
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: qs_feedback_log
        TableType: EXTERNAL_TABLE
        StorageDescriptor:
          Columns:
            - Name: user_arn
              Type: string
            - Name: user_type
              Type: string
            - Name: status_code
              Type: string
            - Name: conversation_id
              Type: string
            - Name: research_id
              Type: string
            - Name: system_message_id
              Type: string
            - Name: user_message_id
              Type: string
            - Name: feedback_type
              Type: string
            - Name: feedback_reason
              Type: string
            - Name: rating
              Type: string
            - Name: resource_arn
              Type: string
            - Name: event_timestamp
              Type: bigint
            - Name: logtype
              Type: string
            - Name: accountid
              Type: string
          Location: !Sub s3://${AdminSuiteBucket}/monitoring/quicksight/cw-vended-log/feedback-log/AWSLogs/${AWS::AccountId}/quicksuitelogs/
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
            Parameters:
              paths: accountId,conversation_id,event_timestamp,feedback_reason,feedback_type,logType,rating,research_id,resource_arn,status_code,system_message_id,user_arn,user_message_id,user_type
        PartitionKeys:
          - Name: region
            Type: string
          - Name: account_id
            Type: string
          - Name: year
            Type: string
          - Name: month
            Type: string
          - Name: day
            Type: string
          - Name: hour
            Type: string
        Parameters:
          projection.enabled: 'true'
          projection.region.type: enum
          projection.region.values: us-east-1,us-east-2,us-west-2
          projection.account_id.type: enum
          projection.account_id.values: !Ref AWS::AccountId
          projection.year.type: integer
          projection.year.range: '2024,2030'
          projection.month.type: integer
          projection.month.range: '01,12'
          projection.month.digits: '2'
          projection.day.type: integer
          projection.day.range: '01,31'
          projection.day.digits: '2'
          projection.hour.type: integer
          projection.hour.range: '00,23'
          projection.hour.digits: '2'
          storage.location.template: !Sub s3://${AdminSuiteBucket}/monitoring/quicksight/cw-vended-log/feedback-log/AWSLogs/${AWS::AccountId}/quicksuitelogs/$${region}/$${account_id}/$${year}/$${month}/$${day}/$${hour}/
          classification: json
          compressionType: gzip
          partition_filtering.enabled: 'true'
          typeOfData: file

  AgentHoursLogTable:
    Type: AWS::Glue::Table
    DependsOn: GlueDatabase
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: qs_agent_hours_log
        TableType: EXTERNAL_TABLE
        StorageDescriptor:
          Columns:
            - Name: subscription_type
              Type: string
            - Name: reporting_service
              Type: string
            - Name: usage_group
              Type: string
            - Name: usage_hours
              Type: decimal(10,2)
            - Name: service_resource_arn
              Type: string
            - Name: event_timestamp
              Type: bigint
            - Name: logtype
              Type: string
            - Name: accountid
              Type: string
          Location: !Sub s3://${AdminSuiteBucket}/monitoring/quicksight/cw-vended-log/agent-hours-log/AWSLogs/${AWS::AccountId}/quicksuitelogs/
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
            Parameters:
              paths: accountId,event_timestamp,logType,reporting_service,service_resource_arn,subscription_type,usage_group,usage_hours
        PartitionKeys:
          - Name: region
            Type: string
          - Name: account_id
            Type: string
          - Name: year
            Type: string
          - Name: month
            Type: string
          - Name: day
            Type: string
          - Name: hour
            Type: string
        Parameters:
          projection.enabled: 'true'
          projection.region.type: enum
          projection.region.values: us-east-1,us-east-2,us-west-2
          projection.account_id.type: enum
          projection.account_id.values: !Ref AWS::AccountId
          projection.year.type: integer
          projection.year.range: '2024,2030'
          projection.month.type: integer
          projection.month.range: '01,12'
          projection.month.digits: '2'
          projection.day.type: integer
          projection.day.range: '01,31'
          projection.day.digits: '2'
          projection.hour.type: integer
          projection.hour.range: '00,23'
          projection.hour.digits: '2'
          storage.location.template: !Sub s3://${AdminSuiteBucket}/monitoring/quicksight/cw-vended-log/agent-hours-log/AWSLogs/${AWS::AccountId}/quicksuitelogs/$${region}/$${account_id}/$${year}/$${month}/$${day}/$${hour}/
          classification: json
          compressionType: gzip
          partition_filtering.enabled: 'true'
          typeOfData: file

  # CloudWatch Log Groups
  ChatLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/quicksight/chat-logs-${AWS::StackName}
      LogGroupClass: STANDARD
      RetentionInDays: 30

  FeedbackLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/quicksight/feedback-logs-${AWS::StackName}
      LogGroupClass: STANDARD
      RetentionInDays: 30

  AgentHoursLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/quicksight/agent-hours-logs-${AWS::StackName}
      LogGroupClass: STANDARD
      RetentionInDays: 30

  # Delivery Sources
  ChatLogDeliverySource:
    Type: AWS::Logs::DeliverySource
    Properties:
      Name: !Sub qs-chat-log-${AWS::StackName}
      ResourceArn: !Sub arn:aws:quicksight:${AWS::Region}:${AWS::AccountId}:account/${AWS::AccountId}
      LogType: CHAT_LOGS

  FeedbackLogDeliverySource:
    Type: AWS::Logs::DeliverySource
    Properties:
      Name: !Sub qs-feedback-log-${AWS::StackName}
      ResourceArn: !Sub arn:aws:quicksight:${AWS::Region}:${AWS::AccountId}:account/${AWS::AccountId}
      LogType: FEEDBACK_LOGS

  AgentHoursLogDeliverySource:
    Type: AWS::Logs::DeliverySource
    Properties:
      Name: !Sub qs-agent-hours-${AWS::StackName}
      ResourceArn: !Sub arn:aws:quicksight:${AWS::Region}:${AWS::AccountId}:account/${AWS::AccountId}
      LogType: AGENT_HOURS_LOGS

  # Delivery Destinations
  ChatLogS3Destination:
    Type: AWS::Logs::DeliveryDestination
    DependsOn: AdminSuiteBucketPolicy
    Properties:
      Name: !Sub qs-chat-log-s3-${AWS::StackName}
      DestinationResourceArn: !Sub ${AdminSuiteBucket.Arn}/monitoring/quicksight/cw-vended-log/chat-log/

  FeedbackLogS3Destination:
    Type: AWS::Logs::DeliveryDestination
    DependsOn: AdminSuiteBucketPolicy
    Properties:
      Name: !Sub qs-feedback-log-s3-${AWS::StackName}
      DestinationResourceArn: !Sub ${AdminSuiteBucket.Arn}/monitoring/quicksight/cw-vended-log/feedback-log/

  AgentHoursLogS3Destination:
    Type: AWS::Logs::DeliveryDestination
    DependsOn: AdminSuiteBucketPolicy
    Properties:
      Name: !Sub qs-agent-hours-log-s3-${AWS::StackName}
      DestinationResourceArn: !Sub ${AdminSuiteBucket.Arn}/monitoring/quicksight/cw-vended-log/agent-hours-log/

  # Deliveries
  ChatLogDelivery:
    Type: AWS::Logs::Delivery
    Properties:
      DeliverySourceName: !Ref ChatLogDeliverySource
      DeliveryDestinationArn: !GetAtt ChatLogS3Destination.Arn

  FeedbackLogDelivery:
    Type: AWS::Logs::Delivery
    Properties:
      DeliverySourceName: !Ref FeedbackLogDeliverySource
      DeliveryDestinationArn: !GetAtt FeedbackLogS3Destination.Arn

  AgentHoursLogDelivery:
    Type: AWS::Logs::Delivery
    Properties:
      DeliverySourceName: !Ref AgentHoursLogDeliverySource
      DeliveryDestinationArn: !GetAtt AgentHoursLogS3Destination.Arn

Outputs:
  S3BucketName:
    Description: S3 bucket for vended logs
    Value: !Ref AdminSuiteBucket

  GlueDatabaseName:
    Description: Glue database name
    Value: !Ref GlueDatabase

  ChatLogS3Location:
    Description: S3 location for QuickSight chat logs
    Value: !Sub s3://${AdminSuiteBucket}/monitoring/quicksight/cw-vended-log/chat-log/

  FeedbackLogS3Location:
    Description: S3 location for QuickSight feedback logs
    Value: !Sub s3://${AdminSuiteBucket}/monitoring/quicksight/cw-vended-log/feedback-log/

  AgentHoursLogS3Location:
    Description: S3 location for QuickSight agent hours logs
    Value: !Sub s3://${AdminSuiteBucket}/monitoring/quicksight/cw-vended-log/agent-hours-log/

  ChatLogTableName:
    Description: Glue table for chat logs
    Value: !Ref ChatLogTable

  FeedbackLogTableName:
    Description: Glue table for feedback logs
    Value: !Ref FeedbackLogTable

  AgentHoursLogTableName:
    Description: Glue table for agent hours logs
    Value: !Ref AgentHoursLogTable
