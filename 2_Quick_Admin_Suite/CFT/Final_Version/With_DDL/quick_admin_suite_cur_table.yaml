AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Cost and Usage Report (CUR) Glue Table for QuickSight'

Parameters:
  CURBucketName:
    Type: String
    Description: S3 bucket name where CUR reports are stored
    Default: aws-cur-reports-bucket
  
  CURReportName:
    Type: String
    Description: Name of the CUR report
    Default: cur-report

Resources:
  CURTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: quicksight_monitoring
      TableInput:
        Name: cur_usage_report
        TableType: EXTERNAL_TABLE
        StorageDescriptor:
          Columns:
            - Name: identity_line_item_id
              Type: string
            - Name: identity_time_interval
              Type: string
            - Name: bill_invoice_id
              Type: string
            - Name: bill_billing_entity
              Type: string
            - Name: bill_bill_type
              Type: string
            - Name: bill_payer_account_id
              Type: string
            - Name: bill_billing_period_start_date
              Type: timestamp
            - Name: bill_billing_period_end_date
              Type: timestamp
            - Name: line_item_usage_account_id
              Type: string
            - Name: line_item_line_item_type
              Type: string
            - Name: line_item_usage_start_date
              Type: timestamp
            - Name: line_item_usage_end_date
              Type: timestamp
            - Name: line_item_product_code
              Type: string
            - Name: line_item_usage_type
              Type: string
            - Name: line_item_operation
              Type: string
            - Name: line_item_availability_zone
              Type: string
            - Name: line_item_resource_id
              Type: string
            - Name: line_item_usage_amount
              Type: double
            - Name: line_item_normalization_factor
              Type: double
            - Name: line_item_normalized_usage_amount
              Type: double
            - Name: line_item_currency_code
              Type: string
            - Name: line_item_unblended_rate
              Type: string
            - Name: line_item_unblended_cost
              Type: double
            - Name: line_item_blended_rate
              Type: string
            - Name: line_item_blended_cost
              Type: double
            - Name: line_item_net_unblended_rate
              Type: string
            - Name: line_item_net_unblended_cost
              Type: double
            - Name: product_product_name
              Type: string
            - Name: product_product_family
              Type: string
            - Name: product_servicecode
              Type: string
            - Name: product_servicename
              Type: string
            - Name: product_region
              Type: string
            - Name: pricing_rate_code
              Type: string
            - Name: pricing_rate_id
              Type: string
            - Name: pricing_currency
              Type: string
            - Name: pricing_public_on_demand_cost
              Type: double
            - Name: pricing_public_on_demand_rate
              Type: string
            - Name: pricing_term
              Type: string
            - Name: pricing_unit
              Type: string
            - Name: reservation_reservation_a_r_n
              Type: string
            - Name: reservation_number_of_reservations
              Type: string
            - Name: reservation_units_per_reservation
              Type: string
            - Name: reservation_start_time
              Type: string
            - Name: reservation_end_time
              Type: string
          Location: !Sub s3://${CURBucketName}/${CURReportName}/
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.apache.hadoop.hive.serde2.lazy.LazySimpleSerDe
            Parameters:
              field.delim: ','
              skip.header.line.count: '1'
        PartitionKeys:
          - Name: year
            Type: string
          - Name: month
            Type: string
        Parameters:
          projection.enabled: 'true'
          projection.year.type: integer
          projection.year.range: '2020,2030'
          projection.month.type: integer
          projection.month.range: '1,12'
          projection.month.digits: '2'
          storage.location.template: !Sub s3://${CURBucketName}/${CURReportName}/year=${year}/month=${month}/
          classification: csv
          compressionType: gzip
          partition_filtering.enabled: 'true'
          typeOfData: file

Outputs:
  CURTableName:
    Description: Name of the CUR Glue table
    Value: !Ref CURTable
    
  CURTableArn:
    Description: ARN of the CUR Glue table
    Value: !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/quicksight_monitoring/cur_usage_report